name: Django CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      CI: true
      SECRET_KEY: 'ci-test-secret-key-not-for-production'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Django djangorestframework djangorestframework_simplejwt python-dotenv

      - name: Run migrations
        working-directory: ./book_manage
        run: python manage.py migrate

      - name: Run tests
        working-directory: ./book_manage
        run: python manage.py test book --verbosity=2
